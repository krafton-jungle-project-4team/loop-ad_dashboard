name: Deploy Dashboard API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/api-server/**
      - packages/shared/**
      - package.json
      - package-lock.json
      - apps/api-server/Dockerfile
      - .github/workflows/deploy-dashboard-api.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/ecs-deploy.yml@main
    with:
      environment: dev
      aws_region: ${{ vars.LOOPAD_DEV_AWS_REGION }}
      role_arn: ${{ vars.LOOPAD_DEV_DEPLOY_ROLE_ARN }}
      service_name: dashboard-api
      ecr_repository: loop-ad/dashboard-api
      ecs_cluster: dev-loop-ad-cluster
      ecs_service: dev-dashboard-api
      container_name: dashboard-api
      dockerfile: apps/api-server/Dockerfile
      context: .
      image_tag: ${{ github.sha }}
      wait_for_service_stability: true
