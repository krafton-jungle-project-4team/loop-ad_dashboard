name: Deploy Dashboard Web

on:
  push:
    branches:
      - main
    paths:
      - apps/web-client/**
      - packages/shared/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/frontend-deploy.yml@main
    with:
      environment: dev
      aws_region: ap-northeast-2
      role_arn: ${{ vars.LOOP_AD_DEV_FRONTEND_DEPLOY_ROLE_ARN }}
      node_version: "25"
      working_directory: .
      install_command: npm ci
      build_command: npm run build -w @loopad/shared && npm run build -w @loopad/web-client
      build_output_dir: apps/web-client/dist
      s3_bucket: loop-ad-dev-dashboard-web
      s3_prefix: .
      cloudfront_distribution_id: ${{ vars.LOOP_AD_DEV_DASHBOARD_WEB_CLOUDFRONT_DISTRIBUTION_ID }}
      cloudfront_invalidation_paths: /*
      asset_cache_control: public,max-age=31536000,immutable
      html_cache_control: no-cache,no-store,must-revalidate
