name: loopad-dashboard

services:
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
      target: development
    command: sh -c "npm run build -w @loopad/shared && npm run dev -w @loopad/api-server"
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      LOOPAD_ENV: ${LOOPAD_ENV:?LOOPAD_ENV is required}
      LOOPAD_SERVICE_ID: ${LOOPAD_SERVICE_ID:?LOOPAD_SERVICE_ID is required}
      PORT: ${PORT:?PORT is required}
      LOOPAD_AURORA_HOST: host.docker.internal
      LOOPAD_AURORA_PORT: ${LOOPAD_AURORA_PORT:?LOOPAD_AURORA_PORT is required}
      LOOPAD_AURORA_USERNAME: ${LOOPAD_AURORA_USERNAME:?LOOPAD_AURORA_USERNAME is required}
      LOOPAD_AURORA_PASSWORD: ${LOOPAD_AURORA_PASSWORD:?LOOPAD_AURORA_PASSWORD is required}
      LOOPAD_AURORA_DATABASE: ${LOOPAD_AURORA_DATABASE:?LOOPAD_AURORA_DATABASE is required}
      LOOPAD_CLICKHOUSE_URL: http://host.docker.internal:${LOOPAD_CLICKHOUSE_HTTP_PORT:?LOOPAD_CLICKHOUSE_HTTP_PORT is required}
      LOOPAD_CLICKHOUSE_DATABASE: ${LOOPAD_CLICKHOUSE_DATABASE:?LOOPAD_CLICKHOUSE_DATABASE is required}
      LOOPAD_CLICKHOUSE_USERNAME: ${LOOPAD_CLICKHOUSE_USERNAME:?LOOPAD_CLICKHOUSE_USERNAME is required}
      LOOPAD_CLICKHOUSE_PASSWORD: ${LOOPAD_CLICKHOUSE_PASSWORD:?LOOPAD_CLICKHOUSE_PASSWORD is required}
      LOOPAD_OPENAI_API_KEY: ${LOOPAD_OPENAI_API_KEY:?LOOPAD_OPENAI_API_KEY is required}
      LOOPAD_AD_DISPATCH_PROVIDER: ${LOOPAD_AD_DISPATCH_PROVIDER:?LOOPAD_AD_DISPATCH_PROVIDER is required}
      LOOPAD_AWS_REGION: ${LOOPAD_AWS_REGION:-ap-northeast-2}
      LOOPAD_AD_EMAIL_FROM_ADDRESS: ${LOOPAD_AD_EMAIL_FROM_ADDRESS:-noreply@loop-ad.example}
      LOOPAD_AD_EMAIL_SES_CONFIGURATION_SET: ${LOOPAD_AD_EMAIL_SES_CONFIGURATION_SET:-}
      LOOPAD_AD_SMS_CONFIGURATION_SET: ${LOOPAD_AD_SMS_CONFIGURATION_SET:-}
      LOOPAD_AD_SMS_ORIGINATION_IDENTITY: ${LOOPAD_AD_SMS_ORIGINATION_IDENTITY:-}
      LOOPAD_DEMO_RECIPIENT_DB_HOST: ${LOOPAD_DEMO_RECIPIENT_DB_HOST:?LOOPAD_DEMO_RECIPIENT_DB_HOST is required}
      LOOPAD_DEMO_RECIPIENT_DB_PORT: ${LOOPAD_DEMO_RECIPIENT_DB_PORT:?LOOPAD_DEMO_RECIPIENT_DB_PORT is required}
      LOOPAD_DEMO_RECIPIENT_DB_USERNAME: ${LOOPAD_DEMO_RECIPIENT_DB_USERNAME:?LOOPAD_DEMO_RECIPIENT_DB_USERNAME is required}
      LOOPAD_DEMO_RECIPIENT_DB_PASSWORD: ${LOOPAD_DEMO_RECIPIENT_DB_PASSWORD:?LOOPAD_DEMO_RECIPIENT_DB_PASSWORD is required}
      LOOPAD_DEMO_RECIPIENT_DB_DATABASE: ${LOOPAD_DEMO_RECIPIENT_DB_DATABASE:?LOOPAD_DEMO_RECIPIENT_DB_DATABASE is required}
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

  web-client:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
      target: development
    command: sh -c "npm run build -w @loopad/shared && npm run dev -w @loopad/web-client"
    environment:
      VITE_LOOPAD_API_BASE_URL: http://localhost:${PORT:?PORT is required}/api
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api-server

volumes:
  api_node_modules:
  web_node_modules:
